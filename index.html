<style>
:root{
  --forest:#0d3320;--fm:#1a5c3a;--fl:#2e8b57;

  --red:#c0392b;--rl:#fdecea;
  --grl:#eaf7ef;--or:#d97706;--orl:#fef3c7;

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--F);background:var(--cream);color:var(--gray800);min-height:100vh}

#app{display:none;min-height:100vh}#app.on{display:flex}
#app-loading{display:none;min-height:100vh;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--navy) 0%,var(--forest) 60%);flex-direction:column;gap:16px}

.sb{width:252px;min-height:100vh;flex-shrink:0;background:linear-gradient(170deg,var(--navy) 0%,var(--forest) 100%);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}

.nb{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--rs);border:none;background:transparent;color:rgba(255,255,255,.55);cursor:pointer;width:100%;text-align:left;font-size:13px;font-family:var(--F);font-weight:400;transition:all .14s;margin-bottom:1px}

.main{flex:1;min-width:0;display:flex;flex-direction:column}

.fl{font-size:11px;font-weight:700;color:var(--gray800);letter-spacing:.03em}

.btn{padding:8px 16px;border:none;border-radius:var(--rs);cursor:pointer;font-size:13px;font-weight:700;font-family:var(--F);transition:all .14s;display:inline-flex;align-items:center;gap:6px}

.bp{background:linear-gradient(135deg,var(--nm),var(--fl));color:#fff}.bs{background:var(--fl);color:#fff}.bd{background:var(--red);color:#fff}

.sm{padding:5px 11px;font-size:12px}.xs{padding:3px 8px;font-size:11px}
.ib{background:none;border:none;cursor:pointer;padding:3px 6px;border-radius:4px;transition:all .13s;font-size:13px}.ib:hover{background:var(--gray100)}
#LS{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--navy) 0%,var(--forest) 60%,var(--nm) 100%);position:relative;overflow:hidden}
#LS::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 70%,rgba(46,139,87,.3) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(201,150,58,.2) 0%,transparent 50%)}
.lbox{background:var(--white);border-radius:20px;padding:44px 36px;width:420px;box-shadow:var(--shl);position:relative;z-index:1}
.lli{width:68px;height:68px;background:linear-gradient(135deg,var(--fl),var(--gold));border-radius:17px;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:30px}
.pw-wrap{position:relative}.pw-eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:var(--gray400)}
.g-btn{width:100%;padding:10px;border:1.5px solid var(--gray200);border-radius:var(--rs);background:#fff;cursor:pointer;font-size:13px;font-weight:700;font-family:var(--F);display:flex;align-items:center;justify-content:center;gap:8px;transition:all .14s;color:var(--gray800)}
.g-btn:hover{border-color:var(--blue);background:var(--bl);transform:translateY(-1px)}
.divider{display:flex;align-items:center;gap:10px;margin:14px 0;color:var(--gray400);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--gray200)}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--white);border-radius:16px;padding:26px;width:100%;max-width:500px;box-shadow:var(--shl);max-height:90vh;overflow-y:auto}.mlg{max-width:680px}
.mt{font-size:17px;font-weight:800;color:var(--nm);margin-bottom:16px}
.acard{background:var(--white);border-radius:var(--r);padding:18px;margin-bottom:12px;box-shadow:var(--sh);border-left:4px solid var(--fl);transition:transform .13s}
.acard:hover{transform:translateX(3px)}.acard.urgent{border-left-color:var(--red)}.acard.info{border-left-color:var(--blue)}.acard.event{border-left-color:var(--purple)}
.wfs{display:flex;align-items:center;gap:0;flex-wrap:wrap;margin-top:10px}
.wfst{display:flex;align-items:center;gap:5px;font-size:11px;padding:4px 10px;border-radius:16px;font-weight:600}
.wfd{background:var(--grl);color:#15803d}.wfp{background:var(--orl);color:var(--or)}.wfw{background:var(--gray100);color:var(--gray400)}.wfa{color:var(--gray200);font-size:14px;margin:0 3px}
.comm-card{background:linear-gradient(135deg,var(--nm),var(--fl));border-radius:var(--r);padding:18px;color:#fff;margin-bottom:14px}
.comm-rate{font-size:28px;font-weight:800}.comm-label{font-size:12px;opacity:.75;margin-top:2px}
.pbl{display:flex;justify-content:space-between;font-size:11px;color:var(--gray600);margin-bottom:3px}
.pb{height:5px;background:var(--gray200);border-radius:3px;overflow:hidden}
.pbf{height:100%;background:linear-gradient(90deg,var(--fl),var(--gold));border-radius:3px;transition:width .6s cubic-bezier(.34,1.56,.64,1)}
.dh{background:linear-gradient(135deg,var(--navy),var(--forest));border-radius:var(--r);padding:18px 20px;margin-bottom:22px;color:#fff}
.empty{text-align:center;padding:38px 18px;color:var(--gray600);font-size:14px}.eico{font-size:36px;margin-bottom:9px}
@keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}.ps{animation:fadeUp .22s ease}
@media(max-width:768px){.sb{display:none}.g2{grid-template-columns:1fr}.g3{grid-template-columns:1fr 1fr}.cnt{padding:14px}}
</style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, doc, getDocs, setDoc, addDoc, updateDoc, deleteDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";

// ══════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════
const EMAILJS_SERVICE_ID  = 'service_2p32i46';
const EMAILJS_TEMPLATE_ID = 'template_djf6bap';
const EMAILJS_PUBLIC_KEY  = 'KmYGxfBnkY9PglqlB';
emailjs.init(EMAILJS_PUBLIC_KEY);

const firebaseConfig = {
  apiKey:"AIzaSyDpMUkv-5nr4r6eIcu6pH9j7c4V9oeobI8",
  authDomain:"ems-sarl.firebaseapp.com",
  projectId:"ems-sarl",
  storageBucket:"ems-sarl.firebasestorage.app",
  messagingSenderId:"954732073802",
  appId:"1:954732073802:web:da9360e7d8fa6b0f2667b3",
  measurementId:"G-4MTVN4D58Q"
};
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const auth = getAuth(app);
const db   = getFirestore(app);
const googleProvider = new GoogleAuthProvider();

// ══════════════════════════════════════════
// CONSTANTES
// ══════════════════════════════════════════
const ROLES={pdg:'PDG',admin:'Directeur Général',chef:"Chef d'équipe",missionnaire:'Missionnaire',rh:'RH / Finance',dev:'Développeur Web'};
const PRODUCTS=['NeemActiv 500mg','PropoBio Sirop','KariteVit Crème','AloeDetox Gel','MoringaBoost Caps'];
const ZONES=['Cotonou Centre','Cotonou Nord','Porto-Novo','Parakou','Lokossa','Bohicon'];
const ANN_TYPES={general:'Général',urgent:'Urgent',info:'Info',event:'Événement'};
const COMM_PALIERS=[
  {min:0,      max:99999,   taux:5,  label:'Palier Bronze'},
  {min:100000, max:199999,  taux:8,  label:'Palier Argent'},
  {min:200000, max:349999,  taux:10, label:'Palier Or'},
  {min:350000, max:Infinity,taux:13, label:'Palier Platine'},
];

// ══════════════════════════════════════════
// ÉTAT GLOBAL
// ══════════════════════════════════════════
let CU=null, CP='dashboard', selMsg=null, nT, pdfMode='mois', membresPDFMode='mois';
let unsubscribers=[];
let DB={users:[],stats:[],plaintes:[],messages:[],annonces:[],demandes:[],recrutements:[],candidatures:[],suppressions:[],changements:[]};

// ══════════════════════════════════════════
// EMAILJS
// ══════════════════════════════════════════
async function sendMail(to_email,to_name,subject,message){
  if(!to_email)return;
  try{
    await emailjs.send(EMAILJS_SERVICE_ID,EMAILJS_TEMPLATE_ID,{
      to_email,to_name,subject,message,
      from_name:'EMS SARL — Mission Manager',
      reply_to:'noreply@ems-sarl.bj'
    });
  }catch(e){console.warn('EmailJS:',e);}
}
async function notifyUsers(roles,subject,message){
  const targets=DB.users.filter(u=>roles.includes(u.role)&&u.email&&u.actif);
  for(const u of targets) await sendMail(u.email,u.name,subject,message);
}
async function notifyUser(userId,subject,message){
  const u=uobj(userId); if(u) await sendMail(u.email,u.name,subject,message);
}

// ══════════════════════════════════════════
// FIRESTORE HELPERS
// ══════════════════════════════════════════
async function fsGetAll(col){
  const snap=await getDocs(collection(db,col));
  return snap.docs.map(d=>({...d.data(),id:d.id}));
}
async function fsAdd(col,data){
  const ref=await addDoc(collection(db,col),{...data,createdAt:serverTimestamp()});
  return ref.id;
}
async function fsSet(col,id,data){
  await setDoc(doc(db,col,String(id)),data,{merge:true});
}
async function fsUpdate(col,id,data){
  await updateDoc(doc(db,col,String(id)),data);
}
async function fsDelete(col,id){
  await deleteDoc(doc(db,col,String(id)));
}
function fsListen(col,callback){
  const unsub=onSnapshot(collection(db,col),snap=>{
    callback(snap.docs.map(d=>({...d.data(),id:d.id})));
  });
  unsubscribers.push(unsub);
}
function stopListeners(){unsubscribers.forEach(u=>u());unsubscribers=[];}

function notify(msg,t='ok'){
  const el=document.getElementById('notif');
  el.textContent=({ok:'✅',er:'❌',inf:'ℹ️'}[t]||'')+' '+msg;
  el.className='on '+t;
  clearTimeout(nT);nT=setTimeout(()=>el.className='',3400);
}
function fmt(n){return(+n).toLocaleString('fr-FR')+' FCFA';}
function today(){return new Date().toISOString().split('T')[0];}
function currentMonth(){return new Date().toISOString().slice(0,7);}
function uname(id){const u=DB.users.find(u=>u.id===id);return u?u.name:'—';}
function uobj(id){return DB.users.find(u=>u.id===id);}
function avH(u,sz=30){
  if(!u)return`<div class="av" style="width:${sz}px;height:${sz}px;font-size:${sz*.33}px;background:#ccc">?</div>`;
  return`<div class="av" style="width:${sz}px;height:${sz}px;font-size:${sz*.33}px">${u.av}</div>`;
}
function tagH(s){
  const mp={validé:'tg','en attente':'to',rejeté:'tr',ouvert:'tb',résolu:'tg',approuvé:'tg',refusé:'tr',urgent:'tr',general:'tg',info:'tb',event:'tp','en cours':'to',accepté:'tg'};
  return`<span class="tag ${mp[s]||'tgr'}">${s}</span>`;
}
function palierColor(p){return{Bronze:'#cd7f32',Argent:'#aaa',Or:'var(--gold)',Platine:'#6c5ce7'}[p.split(' ')[1]]||'var(--fl)';}
function calcComm(userId,month){
  const m=month||currentMonth();
  const total=DB.stats.filter(s=>s.userId===userId&&s.status==='validé'&&s.date.startsWith(m)).reduce((a,s)=>a+s.montant,0);
  const palier=COMM_PALIERS.slice().reverse().find(p=>total>=p.min)||COMM_PALIERS[0];
  return{total,taux:palier.taux,commission:Math.round(total*palier.taux/100),palier:palier.label};
}
function calcCommAll(month){
  return DB.users.filter(u=>u.role==='missionnaire').map(u=>({user:u,...calcComm(u.id,month)}));
}
function initChips(){
  document.querySelectorAll('.chip').forEach(c=>{const i=c.querySelector('input');if(i)i.onchange=()=>c.classList.toggle('sel',i.checked);});
}
function afterRenderInner(){
  setTimeout(()=>{
    document.querySelectorAll('.pbf[data-w]').forEach(el=>{el.style.width='0';setTimeout(()=>el.style.width=el.dataset.w,50);});
    initChips();
  },50);
}
function afterRender(p){
  if(p==='dev')setTimeout(()=>DT('users'),10);
  afterRenderInner();
}

async function loadAllData(){
  const [users,stats,plaintes,messages,annonces,demandes,recrutements,candidatures,suppressions,changements]=await Promise.all([
    fsGetAll('users'),fsGetAll('stats'),fsGetAll('plaintes'),fsGetAll('messages'),
    fsGetAll('annonces'),fsGetAll('demandes'),fsGetAll('recrutements'),fsGetAll('candidatures'),
    fsGetAll('suppressions'),fsGetAll('changements')
  ]);
  DB={users,stats,plaintes,messages,annonces,demandes,recrutements,candidatures,suppressions,changements};
}

function setupListeners(){
  stopListeners();
  fsListen('users',    d=>{DB.users=d;renderSB();});
  fsListen('stats',    d=>{DB.stats=d;renderSB();if(['stats','dashboard','commissions','validation','equipe'].includes(CP))nav(CP);});
  fsListen('annonces', d=>{DB.annonces=d;if(['annonces','dashboard'].includes(CP))nav(CP);});
  fsListen('plaintes', d=>{DB.plaintes=d;if(['plaintes','dashboard'].includes(CP))nav(CP);});
  fsListen('messages', d=>{DB.messages=d;renderSB();if(CP==='messages')nav(CP);});
  fsListen('demandes', d=>{DB.demandes=d;renderSB();if(CP==='demandes')nav(CP);});
  fsListen('recrutements',d=>{DB.recrutements=d;if(CP==='recrutement')nav(CP);});
  fsListen('candidatures',d=>{DB.candidatures=d;if(CP==='recrutement')nav(CP);});
  fsListen('suppressions',d=>{DB.suppressions=d;renderSB();if(CP==='suppressions')nav(CP);});
  fsListen('changements', d=>{DB.changements=d;renderSB();if(CP==='changements')nav(CP);});
}

function openPublicRecru(){
  CU={id:'-1',name:'Visiteur',role:'public',av:'👤',team:null};
  startApp();
}
onAuthStateChanged(auth,async(fbUser)=>{
  if(fbUser){
    showAppLoading();
    try{
      const snap=await getDocs(collection(db,'users'));
      const all=snap.docs.map(d=>({...d.data(),id:d.id}));
      let profile=all.find(u=>u.email.toLowerCase()===fbUser.email.toLowerCase());
      if(!profile){
        const newId=String(Date.now());
        profile={id:newId,name:fbUser.displayName||fbUser.email,email:fbUser.email,role:'missionnaire',
          av:(fbUser.displayName||fbUser.email).slice(0,2).toUpperCase(),team:null,chefId:null,actif:true};
        await setDoc(doc(db,'users',newId),profile);
      }else if(!profile.actif){notify('Compte désactivé.','er');await signOut(auth);return;}
      CU=profile;
      await seedIfEmpty();
      await loadAllData();
      setupListeners();
      startApp();
    }catch(e){notify('Erreur : '+e.message,'er');await signOut(auth);hideAppLoading();}
  }else{
    hideAppLoading();
    document.getElementById('LS').style.display='flex';
    document.getElementById('app').classList.remove('on');
  }
});
function showAppLoading(){document.getElementById('LS').style.display='none';document.getElementById('app-loading').style.display='flex';}
function hideAppLoading(){document.getElementById('app-loading').style.display='none';document.getElementById('LS').style.display='flex';}
function startApp(){
  document.getElementById('LS').style.display='none';
  document.getElementById('app-loading').style.display='none';
  document.getElementById('app').classList.add('on');
  renderSB();renderTB();nav('dashboard');
}

function renderSB(){
  if(!CU)return;
  const r=CU.role;
  const unread=DB.messages.filter(m=>m.to===CU.id&&!m.lu).length;
  const pending=DB.stats.filter(s=>s.status==='en attente'&&s.chefId===CU.id).length;
  const demBadge=r==='admin'||r==='pdg'?DB.demandes.filter(d=>d.statusAdmin==='en attente').length
    :r==='dev'?DB.demandes.filter(d=>d.statusAdmin==='approuvé'&&d.statusDev==='en attente').length
    :r==='chef'?DB.demandes.filter(d=>d.chefId===CU.id&&d.statusDev==='approuvé').length:0;
  const supBadge=r==='dev'?DB.suppressions.filter(s=>s.statusAdmin==='approuvé'&&s.statusDev==='en attente').length
    :r==='admin'||r==='pdg'?DB.suppressions.filter(s=>s.statusAdmin==='en attente').length
    :r==='chef'?DB.suppressions.filter(s=>s.chefId===CU.id&&s.statusDev==='en attente').length:0;
  const chgBadge=r==='dev'?DB.changements.filter(c=>c.statusDev==='en attente').length:0;
  let h='';
  NAVD.forEach(n=>{
    if(n.s){h+=`<div class="sb-sec">${n.s}</div>`;return;}
    if(!n.r.includes(r))return;
    const cnt=n.bd==='unread'?unread:n.bd==='pending'?pending:n.bd==='demande'?demBadge:n.bd==='suppression'?supBadge:n.bd==='changement'?chgBadge:0;
    const bc=n.bd==='unread'?'nbd-b':n.bd==='pending'?'nbd-g':'nbd-r';
    h+=`<button class="nb ${CP===n.id?'on':''}" onclick="nav('${n.id}')"><span class="ni">${n.i}</span><span>${n.l}</span>${cnt>0?`<span class="nbd ${bc}">${cnt}</span>`:''}</button>`;
  });
  document.getElementById('sb-nav').innerHTML=h;
  document.getElementById('sb-av').textContent=CU.av;
  document.getElementById('sb-name').textContent=CU.name;
  document.getElementById('sb-role').textContent=ROLES[CU.role]||CU.role;
}
function renderTB(){
  if(!CU)return;
  document.getElementById('tb-av').textContent=CU.av;
  document.getElementById('tb-name').textContent=CU.name;
  document.getElementById('tb-role').textContent=ROLES[CU.role]||CU.role;
}
const PAGES={dashboard,annonces,stats,commissions,validation,demandes,suppressions,changements,recrutement,equipe,plaintes,messages,dev:devPanel};
function nav(page){
  CP=page;
  document.getElementById('tb-t').textContent=PNAMES[page]||page;
  document.getElementById('tb-s').textContent='';
  renderSB();
  const fn=PAGES[page];
  document.getElementById('pg').innerHTML=fn?fn():`<div class="empty">Page non disponible</div>`;
  afterRender(page);
}

function dashboard(){
  const r=CU.role,uid=CU.id;

  let cards=[];

    const c=calcComm(uid);
    cards=[
      {l:'CA validé ce mois',v:fmt(c.total),i:'💹',c:'var(--fl)'},
      {l:'Commission estimée',v:fmt(c.commission),i:'💰',c:'var(--gold)'},
      {l:'Rapports soumis',v:DB.stats.filter(s=>s.userId===uid).length,i:'📋',c:'var(--nm)'},
      {l:'En attente',v:DB.stats.filter(s=>s.userId===uid&&s.status==='en attente').length,i:'⏳',c:'var(--or)'},
    ];

async function doVal(id,ok){
  const note=document.getElementById('note-'+id)?.value||'';
  if(!ok&&!note)return notify('Motif de rejet requis','er');
  const s=DB.stats.find(s=>s.id===id);
  await fsUpdate('stats',id,{status:ok?'validé':'rejeté',note});
  if(s){
    await notifyUser(s.userId,
      ok?`✅ Rapport validé — ${s.date}`:`❌ Rapport rejeté — ${s.date}`,
      ok?`Bonjour ${uname(s.userId)},\n\nVotre rapport du ${s.date} (${fmt(s.montant)}) a été validé par ${CU.name}.\n\nBravo !\n\nEMS SARL`
        :`Bonjour ${uname(s.userId)},\n\nVotre rapport du ${s.date} a été rejeté.\n\nMotif : ${note}\n\nEMS SARL`);
  }
  notify(ok?'Rapport validé ✅ — Missionnaire notifié':'Rapport rejeté — Missionnaire notifié',ok?'ok':'er');
}

async function submitSuppression(){
  const membreId=document.getElementById('sup-mid').value;
  const motif=document.getElementById('sup-motif').value.trim();
  if(!membreId||!motif)return notify('Sélectionnez un membre et indiquez un motif','er');
  const membre=uobj(membreId);
  if(!membre)return notify('Membre introuvable','er');
  await fsAdd('suppressions',{
    chefId:CU.id,membreId,membreNom:membre.name,membreEmail:membre.email,
    membreTeam:membre.team||'—',motif,date:today(),statusDev:'en attente'
  });
  await notifyUsers(['dev'],`🗑️ Demande de suppression — ${membre.name}`,
    `Bonjour,\n\nLe chef ${CU.name} demande la suppression du compte de ${membre.name}.\n\nMotif : ${motif}\nÉquipe : ${membre.team||'—'}\n\nConnectez-vous pour traiter cette demande.\n\nEMS SARL`);
  notify('Demande de suppression soumise ! Dev notifié.');
  document.getElementById('sup-fw').innerHTML='';
}
async function executerSuppression(id){
  if(!confirm('Confirmer la suppression définitive de ce membre ?'))return;
  const s=DB.suppressions.find(s=>s.id===id);
  if(!s)return;
  // Désactiver le compte (ne pas supprimer pour garder l'historique)
  if(s.membreId) await fsUpdate('users',s.membreId,{actif:false,supprimeLe:today(),supprimeParChef:s.chefId});
  await fsUpdate('suppressions',id,{statusDev:'approuvé',devDate:today()});
  // Notifier le chef
  await notifyUser(s.chefId,`✅ Suppression confirmée — ${s.membreNom}`,
    `Bonjour ${uname(s.chefId)},\n\nLe compte de ${s.membreNom} a été désactivé par le Développeur.\n\nEMS SARL`);
  // Notifier le membre
  await sendMail(s.membreEmail,s.membreNom,`📩 Information EMS SARL`,
    `Bonjour ${s.membreNom},\n\nVotre compte sur EMS SARL Mission Manager a été désactivé.\n\nPour toute question, contactez votre responsable.\n\nCordialement,\nEMS SARL`);
  notify(`Compte ${s.membreNom} désactivé. Chef et membre notifiés.`,'ok');
}
async function refuserSuppression(id){
  const s=DB.suppressions.find(s=>s.id===id);
  await fsUpdate('suppressions',id,{statusDev:'refusé',devDate:today()});
  if(s) await notifyUser(s.chefId,`❌ Suppression refusée — ${s.membreNom}`,
    `Bonjour ${uname(s.chefId)},\n\nLa demande de suppression de ${s.membreNom} a été refusée par le Développeur.\n\nEMS SARL`);
  notify('Demande refusée — Chef notifié');
}

  const eq=document.getElementById('chg-eq').value;
  const chefs=DB.users.filter(u=>u.role==='chef'&&u.team===eq&&u.actif);
  document.getElementById('chg-old').innerHTML=`<option value="">— Choisir —</option>${chefs.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}`;
}
async function submitChangement(){
  const equipe=document.getElementById('chg-eq').value;
  const ancienChefId=document.getElementById('chg-old').value;
  const nouveauChefId=document.getElementById('chg-new').value;
  const motif=document.getElementById('chg-motif').value.trim();
  if(!equipe||!ancienChefId||!nouveauChefId)return notify('Remplissez tous les champs','er');
  if(ancienChefId===nouveauChefId)return notify('Ancien et nouveau chef identiques','er');
  const ancienChef=uobj(ancienChefId);const nouveauChef=uobj(nouveauChefId);
  await fsAdd('changements',{
    demandeurId:CU.id,equipe,
    ancienChefId,ancienChefNom:ancienChef?.name||'—',
    nouveauChefId,nouveauChefNom:nouveauChef?.name||'—',
    motif,date:today(),statusDev:'en attente'
  });
  await notifyUsers(['dev'],`🔄 Changement de chef — ${equipe}`,
    `Bonjour,\n\n${CU.name} demande un changement de chef pour l'équipe ${equipe} :\n\n👤 Ancien : ${ancienChef?.name||'—'}\n👤 Nouveau : ${nouveauChef?.name||'—'}\n📝 Motif : ${motif||'—'}\n\nConnectez-vous pour appliquer ce changement.\n\nEMS SARL`);
  notify('Demande soumise ! Dev notifié.');
  document.getElementById('chg-fw').innerHTML='';
}
async function executerChangement(id){
  if(!confirm('Appliquer ce changement de chef ?'))return;
  const c=DB.changements.find(c=>c.id===id);
  if(!c)return;
  // Mettre à jour tous les membres de l'équipe : changer chefId
  const membres=DB.users.filter(u=>u.chefId===c.ancienChefId&&u.role==='missionnaire');
  for(const m of membres) await fsUpdate('users',m.id,{chefId:c.nouveauChefId});
  // Mettre à jour le nouveau chef : assigner l'équipe
  await fsUpdate('users',c.nouveauChefId,{team:c.equipe});
  await fsUpdate('changements',id,{statusDev:'approuvé',devDate:today()});
  // Notifier les deux chefs
  await notifyUser(c.ancienChefId,`📩 Changement de chef — ${c.equipe}`,
    `Bonjour ${c.ancienChefNom},\n\nVous avez été remplacé comme chef de l'équipe ${c.equipe} par ${c.nouveauChefNom}.\n\nDecision de : ${uname(c.demandeurId)}.\n\nEMS SARL`);
  await notifyUser(c.nouveauChefId,`🎉 Vous êtes maintenant chef de ${c.equipe}`,
    `Bonjour ${c.nouveauChefNom},\n\nVous avez été nommé chef de l'équipe ${c.equipe} par ${uname(c.demandeurId)}.\n\nL'équipe comprend ${membres.length} membre(s).\n\nEMS SARL`);
  await notifyUser(c.demandeurId,`✅ Changement appliqué — ${c.equipe}`,
    `Bonjour,\n\nLe changement de chef pour ${c.equipe} a été appliqué.\n\nAncien : ${c.ancienChefNom} → Nouveau : ${c.nouveauChefNom}\n${membres.length} membre(s) transféré(s).\n\nEMS SARL`);
  notify(`Changement appliqué ! ${membres.length} membres transférés. Parties notifiées.`,'ok');
}
async function refuserChangement(id){
  const c=DB.changements.find(c=>c.id===id);
  await fsUpdate('changements',id,{statusDev:'refusé',devDate:today()});
  if(c) await notifyUser(c.demandeurId,`❌ Changement refusé — ${c.equipe}`,
    `Bonjour,\n\nVotre demande de changement de chef pour ${c.equipe} a été refusée par le Développeur.\n\nEMS SARL`);
  notify('Changement refusé — Demandeur notifié');
}

async function submitPlainte(){
  const o=document.getElementById('pob').value.trim(),m=document.getElementById('pmsg').value.trim();
  if(!o||!m)return notify('Remplissez tous les champs','er');
  await fsAdd('plaintes',{userId:CU.id,date:today(),objet:o,message:m,status:'ouvert',reponse:''});
  await notifyUsers(['pdg','admin','dev'],`📢 Nouvelle plainte — ${o}`,
    `Bonjour,\n\nNouvelle plainte :\n\n👤 ${CU.name} (${ROLES[CU.role]})\n📋 ${o}\n\n💬 ${m}\n\nConnectez-vous pour répondre.\n\nEMS SARL`);
  notify('Plainte soumise ! Direction notifiée.');
  document.getElementById('pl-fw').innerHTML='';
}
async function repondre(id){
  const r=document.getElementById('rep-'+id)?.value.trim();
  if(!r)return notify('Réponse vide','er');
  const p=DB.plaintes.find(p=>p.id===id);
  await fsUpdate('plaintes',id,{status:'résolu',reponse:r});
  if(p)await notifyUser(p.userId,`✅ Réponse à votre plainte — ${p.objet}`,
    `Bonjour ${uname(p.userId)},\n\nVotre plainte "${p.objet}" a reçu une réponse de ${CU.name} :\n\n💬 "${r}"\n\nPlainte résolue.\n\nEMS SARL`);
  notify('Réponse envoyée — Plaignant notifié !');
}

function pdfHeader(doc,title,sub){
  doc.setFillColor(15,39,68);doc.rect(0,0,doc.internal.pageSize.width,30,'F');
  doc.setFillColor(46,139,87);doc.rect(0,28,doc.internal.pageSize.width,2,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(16);doc.setFont('helvetica','bold');
  doc.text('EMS SARL — Mission Manager',14,13);
  doc.setFontSize(11);doc.setFont('helvetica','normal');doc.text(title,14,21);
  doc.setTextColor(40,40,40);doc.setFontSize(9);
  doc.text(`Généré le ${new Date().toLocaleDateString('fr-FR')} par ${CU.name}`,14,37);
  if(sub)doc.text(sub,14,43);
  return sub?48:42;
}
function pdfFooter(doc){
  const pageCount=doc.internal.getNumberOfPages();
  for(let i=1;i<=pageCount;i++){
    doc.setPage(i);
    const w=doc.internal.pageSize.width;
    const h=doc.internal.pageSize.height;
    doc.setFontSize(7);doc.setTextColor(150,150,150);
    doc.text('© EMS SARL — Tous droits réservés | Initiative de Kouessi Franck Kévin ADRE & HOUESSOU Gbessou Kamarou',14,h-8);
    doc.text(`Page ${i} / ${pageCount}`,w-30,h-8);
  }
}

function exportPDFRapportsFiltres(){
  const{jsPDF}=window.jspdf;const doc=new jsPDF();
  let filtered,periodLabel;
  if(pdfMode==='mois'){
    const mois=document.getElementById('pdf-mois')?.value||currentMonth();
    filtered=DB.stats.filter(s=>s.status==='validé'&&s.date.startsWith(mois));
    periodLabel=`Mois : ${mois}`;
  }else{
    const du=document.getElementById('pdf-du')?.value,au=document.getElementById('pdf-au')?.value;
    if(!du||!au)return notify('Sélectionnez les deux dates','er');
    filtered=DB.stats.filter(s=>s.status==='validé'&&s.date>=du&&s.date<=au);
    periodLabel=`Du ${du} au ${au}`;
  }
  if(CU.role==='chef')filtered=filtered.filter(s=>s.chefId===CU.id);
  const total=filtered.reduce((a,s)=>a+s.montant,0);
  const y=pdfHeader(doc,`Rapports de vente — ${periodLabel}`,`Total validé : ${fmt(total)} · ${filtered.length} rapport(s)`);
  const rows=filtered.map(s=>[s.date,uname(s.userId),s.visites,s.prospects,fmt(s.montant),s.zone]);
  doc.autoTable({startY:y,head:[['Date','Agent commercial','Visites','Prospects','Montant','Zone']],body:rows,theme:'grid',headStyles:{fillColor:[30,58,95],textColor:255,fontStyle:'bold',fontSize:9},bodyStyles:{fontSize:9},alternateRowStyles:{fillColor:[244,247,244]},foot:[['','','','TOTAL',fmt(total),'']],footStyles:{fillColor:[30,58,95],textColor:255,fontStyle:'bold'}});
  pdfFooter(doc);
  const fname=pdfMode==='mois'?(document.getElementById('pdf-mois')?.value||currentMonth()):`${document.getElementById('pdf-du')?.value}_${document.getElementById('pdf-au')?.value}`;
  doc.save(`ems_rapports_${fname}.pdf`);notify('PDF rapports généré !','inf');
}

function exportPDFMembresFiltre(){
  const{jsPDF}=window.jspdf;const doc=new jsPDF('landscape');
  let members=CU.role==='chef'?DB.users.filter(u=>u.chefId===CU.id&&u.actif):DB.users.filter(u=>u.role==='missionnaire'&&u.actif);
  let periodLabel='Toutes périodes';
  let statsFilter=s=>s.status==='validé';
  if(membresPDFMode==='mois'){
    const mois=document.getElementById('mp-mois')?.value||currentMonth();
    periodLabel=`Mois : ${mois}`;statsFilter=s=>s.status==='validé'&&s.date.startsWith(mois);
  }else if(membresPDFMode==='plage'){
    const du=document.getElementById('mp-du')?.value,au=document.getElementById('mp-au')?.value;
    if(!du||!au)return notify('Sélectionnez les deux dates','er');
    periodLabel=`Du ${du} au ${au}`;statsFilter=s=>s.status==='validé'&&s.date>=du&&s.date<=au;
  }
  const y=pdfHeader(doc,`Liste des agents commerciaux — ${periodLabel}`,`${members.length} agent(s) actif(s)`);
  const rows=members.map(m=>{
    const ms=DB.stats.filter(s=>s.userId===m.id&&statsFilter(s));
    const ca=ms.reduce((a,s)=>a+s.montant,0);
    const vis=ms.reduce((a,s)=>a+s.visites,0);
    const comm=calcComm(m.id);
    return[m.name,m.email,m.team||'—',fmt(ca),vis,`${comm.taux}%`,fmt(comm.commission),comm.palier];
  });
  doc.autoTable({startY:y,head:[['Nom','Email','Équipe','Ventes validées','Visites','Taux','Commission','Statut']],body:rows,theme:'grid',headStyles:{fillColor:[13,51,32],textColor:255,fontStyle:'bold',fontSize:9},bodyStyles:{fontSize:9},alternateRowStyles:{fillColor:[234,247,239]}});
  pdfFooter(doc);
  doc.save(`ems_agents_${today()}.pdf`);notify('PDF agents généré !','inf');
}

function exportPDFCommissions(){

  doc.text('Barème : < 100 000 FCFA → 0% | 100 000 – 252 499 FCFA → 18% | ≥ 252 500 FCFA → 27%',14,y-2);
  const rows=all.map(c=>[c.user.name,c.user.team||'—',fmt(c.total),`${c.taux}%`,fmt(c.commission),c.palier]);
  doc.autoTable({startY:y+2,head:[['Agent commercial','Équipe','Ventes validées','Taux','Commission','Statut']],body:rows,theme:'grid',headStyles:{fillColor:[201,150,58],textColor:255,fontStyle:'bold',fontSize:9},bodyStyles:{fontSize:9},alternateRowStyles:{fillColor:[255,250,235]},foot:[['','TOTAL',fmt(totalVentes),'',fmt(total),'']],footStyles:{fillColor:[30,58,95],textColor:255,fontStyle:'bold'}});
  pdfFooter(doc);
  doc.save(`ems_commissions_${month}.pdf`);notify('PDF commissions exporté !','inf');
}

function exportPDFEquipes(){
  const{jsPDF}=window.jspdf;const doc=new jsPDF();
  const y=pdfHeader(doc,'Performance des équipes',`Mois en cours : ${currentMonth()}`);
  const chefs=DB.users.filter(u=>u.role==='chef');let startY=y;
  chefs.forEach((chef,i)=>{
    const members=DB.users.filter(u=>u.chefId===chef.id&&u.actif);
    if(i>0)startY+=6;
    doc.setFontSize(11);doc.setFont('helvetica','bold');doc.setTextColor(30,58,95);
    doc.text(`${chef.team||chef.name} — Chef : ${chef.name}`,14,startY);startY+=2;
    const rows=members.map(m=>{const c=calcComm(m.id);return[m.name,m.email,fmt(c.total),`${c.taux}%`,fmt(c.commission),c.palier];});
    if(!rows.length)rows.push(['Aucun agent','—','—','—','—','—']);
    doc.autoTable({startY,head:[['Agent commercial','Email','Ventes validées','Taux','Commission','Statut']],body:rows,theme:'grid',headStyles:{fillColor:[46,139,87],textColor:255,fontStyle:'bold',fontSize:9},bodyStyles:{fontSize:9},alternateRowStyles:{fillColor:[234,247,239]}});
    startY=doc.lastAutoTable.finalY+4;
  });
  pdfFooter(doc);
  doc.save(`ems_equipes_${today()}.pdf`);notify('PDF équipes exporté !','inf');
}
